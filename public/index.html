<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eloflex</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div class="app" id="app">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-logo"><i class="ti ti-wheelchair"></i>Eloflex</div>
      <nav class="nav-section">
        <div class="nav-label">Principal</div>
        <div class="nav-item" data-view="dashboard"><i class="ti ti-dashboard"></i><span data-i18n="nav_dashboard">Tableau de bord</span></div>
        <div class="nav-item" data-view="commandes"><i class="ti ti-clipboard-list"></i><span data-i18n="nav_commandes">Suivi commandes</span></div>
        <div class="nav-item" data-view="devis"><i class="ti ti-file-invoice"></i><span>Devis VosFactures</span></div>
        <div class="nav-label">Distributeurs</div>
        <div class="nav-item" data-view="clients"><i class="ti ti-users"></i><span data-i18n="nav_clients">Clients / Distributeurs</span></div>
        <div class="nav-item" data-view="interventions"><i class="ti ti-tool"></i><span data-i18n="nav_interventions">Interventions</span></div>
        <div class="nav-item" data-view="expeditions"><i class="ti ti-truck-delivery"></i><span data-i18n="nav_expeditions">Expéditions SAV</span> <span id="badge-exp" class="nav-badge" style="display:none"></span></div>
        <div class="nav-label">Ressources</div>
        <div class="nav-item" data-view="catalogue"><i class="ti ti-box"></i><span data-i18n="nav_catalogue">Catalogue pièces</span> <span id="badge-stock" class="nav-badge danger" style="display:none"></span></div>
        <div class="nav-label">Rapports</div>
        <div class="nav-item" data-view="rapports"><i class="ti ti-chart-bar"></i><span data-i18n="nav_rapports">Rapports & exports</span></div>
        <div class="nav-label">Système</div>
        <div class="nav-item" data-view="alertes"><i class="ti ti-bell"></i><span data-i18n="nav_alertes">Alertes</span></div>
        <div class="nav-item" data-view="discussions"><i class="ti ti-messages"></i><span>Discussions</span><span id="discussions-badge" style="display:none;background:var(--accent);color:#fff;border-radius:99px;padding:0 5px;font-size:10px;margin-left:auto"></span></div>
        <div class="nav-item" data-view="retours-suede"><i class="ti ti-package"></i>Retours Suède</div>
        <div class="nav-item" data-view="transferts"><i class="ti ti-arrows-exchange"></i><span data-i18n="transferts_title">Transferts fauteuils</span></div>
        <div class="nav-item" data-view="parametres"><i class="ti ti-settings"></i><span data-i18n="nav_parametres">Paramètres</span></div>
      </nav>
      <div class="sidebar-footer">
        <div id="vf-status" class="vf-status"></div>
        <button class="btn sm full" id="btn-sync" onclick="syncVosFactures()"><i class="ti ti-refresh"></i>Sync VosFactures</button>
        <button class="btn sm full dark-toggle" onclick="toggleDark()" style="margin-top:5px"><i class="ti ti-moon"></i>Mode sombre</button>
        <div id="user-zone" style="display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)"></div>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <div class="topbar-title" id="topbar-title"><span data-i18n="nav_dashboard">Tableau de bord</span></div>
        <div id="topbar-actions" style="display:flex;gap:6px;align-items:center"></div>
        <button class="btn sm" id="btn-alertes" onclick="setView('alertes')" style="position:relative;margin-left:6px">
          <i class="ti ti-bell"></i><span id="badge-alertes" class="notif-dot" style="display:none"></span>
        </button>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>
  <div id="modal-area"></div>
  <div id="toast-area"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/pdf.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/devis.js"></script>
</body>
</html>
