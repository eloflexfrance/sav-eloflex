<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Suivi SAV Éloflex</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;font-size:14px;background:#f5f5f4;color:#1a1a18;min-height:100vh}
    .header{background:#fff;border-bottom:1px solid rgba(0,0,0,.09);padding:14px 20px;display:flex;align-items:center;gap:10px}
    .header h1{font-size:16px;font-weight:700}<br>
    .container{max-width:860px;margin:24px auto;padding:0 16px}
    .card{background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:10px;padding:16px;margin-bottom:14px}
    .card h2{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;color:#5f5e5a}
    .badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600}
    .badge.g{background:#eaf3de;color:#27864a}.badge.hg{background:#faeeda;color:#b45309}.badge.ouvert{background:#e6f1fb;color:#1d6fd8}.badge.ferme{background:#eaf3de;color:#27864a}.badge.attente{background:#faeeda;color:#b45309}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;padding:7px 10px;font-size:11px;color:#9a9894;border-bottom:1px solid rgba(0,0,0,.09);font-weight:600}
    td{padding:9px 10px;border-bottom:1px solid rgba(0,0,0,.06);font-size:12px;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    .mono{font-family:monospace;font-size:11px}
    .empty{text-align:center;padding:28px;color:#9a9894}
    .tracking{background:#f9f9f8;border-radius:7px;padding:10px;font-size:12px;margin-top:4px}
    .error{text-align:center;padding:60px 20px;color:#c0392b}
    .error i{font-size:40px;display:block;margin-bottom:12px}
    .loading{text-align:center;padding:60px 20px;color:#9a9894}
  </style>
</head>
<body>
  <div class="header">
    <i class="ti ti-wheelchair" style="font-size:22px;color:#1d6fd8"></i>
    <h1 id="title">Suivi SAV Éloflex</h1>
  </div>
  <div class="container" id="app">
    <div class="loading"><i class="ti ti-loader-2" style="font-size:32px;display:block;margin-bottom:10px"></i>Chargement…</div>
  </div>
  <script>
    const fd=d=>{if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;};
    const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const sc=s=>s==='Ouvert'?'ouvert':s==='Fermé'?'ferme':s==='En attente'?'attente':'ouvert';
    const token=new URLSearchParams(location.search).get('token');
    const app=document.getElementById('app');
    if(!token){app.innerHTML='<div class="error"><i class="ti ti-link-off"></i>Lien invalide ou expiré.</div>';}
    else{
      fetch(`/api/portail/${token}`).then(r=>{if(!r.ok)throw new Error();return r.json();}).then(data=>{
        document.getElementById('title').textContent=`Suivi SAV — ${data.client.nom}`;
        const{fauteuils,interventions}=data;
        app.innerHTML=`
          <div class="card"><h2><i class="ti ti-users"></i>Distributeur</h2>
            <div style="font-size:13px;font-weight:600">${esc(data.client.nom)}</div>
            <div style="font-size:12px;color:#5f5e5a">${esc(data.client.ville||'')}</div>
          </div>
          <div class="card"><h2><i class="ti ti-wheelchair"></i>Fauteuils (${fauteuils.length})</h2>
            ${fauteuils.length===0?'<div class="empty">Aucun fauteuil</div>':`<table>
              <thead><tr><th>Modèle</th><th>Série</th><th>Année</th><th>Achat</th><th>Facture</th></tr></thead>
              <tbody>${fauteuils.map(f=>`<tr><td style="font-weight:600">${esc(f.modele)}</td><td class="mono">${esc(f.serie)}</td><td>${f.annee||'—'}</td><td>${fd(f.date_achat)}</td><td class="mono" style="color:#1d6fd8">${esc(f.num_facture||'')}</td></tr>`).join('')}</tbody>
            </table>`}
          </div>
          <div class="card"><h2><i class="ti ti-tool"></i>Interventions SAV (${interventions.length})</h2>
            ${interventions.length===0?'<div class="empty">Aucune intervention</div>':interventions.map(i=>`
              <div style="padding:12px;border-bottom:1px solid rgba(0,0,0,.06)">
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px">
                  <span style="font-weight:700">#${i.id} — ${esc(i.type)}</span>
                  <span class="badge ${i.garantie?'g':'hg'}">${i.garantie?'Garantie':'Hors garantie'}</span>
                  <span class="badge ${sc(i.statut)}">${esc(i.statut)}</span>
                  <span style="margin-left:auto;font-size:11px;color:#9a9894">${fd(i.date)} — ${esc(i.modele)}</span>
                </div>
                <div style="font-size:12px;color:#5f5e5a;margin-bottom:6px">${esc(i.description||'')}</div>
                ${i.envoi_numero?`<div class="tracking"><b>Envoi :</b> ${esc(i.envoi_transporteur||'')} — <span class="mono">${esc(i.envoi_numero)}</span> — ${fd(i.envoi_date)}</div>`:''}
                ${i.retour_numero?`<div class="tracking" style="margin-top:4px"><b>Retour :</b> ${esc(i.retour_transporteur||'')} — <span class="mono">${esc(i.retour_numero)}</span> — ${fd(i.retour_date)}</div>`:''}
              </div>`).join('')}
          </div>
          <div style="text-align:center;font-size:11px;color:#9a9894;padding:16px">
            Ce portail est en lecture seule. Pour toute question, contactez votre interlocuteur Éloflex.
          </div>`;
      }).catch(()=>{app.innerHTML='<div class="error"><i class="ti ti-alert-circle"></i>Lien invalide ou portail désactivé.</div>';});
    }
  </script>
</body>
</html>
