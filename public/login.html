<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAV Éloflex — Connexion</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f4f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e4e9;
      border-radius: 14px;
      padding: 40px 36px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .logo i { font-size: 26px; color: #2563eb; }
    .logo-text { font-size: 19px; font-weight: 700; color: #111; }
    .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 28px; margin-top: 4px; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11.5px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      letter-spacing: .03em;
    }
    .field input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fafafa;
      color: #111;
      font-size: 14px;
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      background: #fff;
    }
    .btn-login {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-login:hover { background: #1d4ed8; }
    .btn-login:disabled { opacity: .6; cursor: wait; }
    .error {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 8px;
      font-size: 12.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <i class="ti ti-wheelchair"></i>
      <span class="logo-text">SAV Éloflex</span>
    </div>
    <p class="subtitle">Connectez-vous pour accéder à l'application</p>

    <div class="field">
      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" autocomplete="email" placeholder="prenom.nom@eloflex.fr">
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
    </div>

    <button class="btn-login" id="btn-login" onclick="seConnecter()">Se connecter</button>
    <div class="error" id="err"></div>
  </div>

  <script>
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') seConnecter();
    });

    async function seConnecter() {
      const email        = document.getElementById('email').value.trim();
      const mot_de_passe = document.getElementById('password').value;
      const errEl        = document.getElementById('err');
      const btn          = document.getElementById('btn-login');

      errEl.style.display = 'none';
      if (!email || !mot_de_passe) {
        errEl.textContent = 'Veuillez saisir votre e-mail et votre mot de passe.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Connexion en cours…';

      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, mot_de_passe })
        });
        const data = await r.json();
        if (r.ok && data.ok) {
          window.location.href = '/';
        } else {
          errEl.textContent = data.error || 'Identifiants incorrects.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Se connecter';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (e) {
        errEl.textContent = 'Impossible de joindre le serveur. Réessayez.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    }
  </script>
</body>
</html>
